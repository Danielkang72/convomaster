// 🤖 OPENAI API INTEGRATION
// ═══════════════════════════════════════════════════════
async function callOpenAI(messages, apiKey, lang, scenarioContext) {
  const langLabel = lang === "en" ? "English" : "Japanese";
  const sysMsg = {
    role: "system",
    content: `You are a friendly native ${langLabel} speaker helping someone practice ${langLabel} conversation.
Stay in character for the scenario (context: ${scenarioContext}).
Respond naturally in ${langLabel} ONLY (2-3 sentences max).

After your in-character response, add exactly these sections on new lines:
📝 (brief feedback on the user's ${langLabel} in Korean - grammar, naturalness, pronunciation tips)
💡 (3 alternative native expressions the user could have said, numbered 1-3, in ${langLabel} with Korean translation)
📖 (2-3 useful vocabulary words from this exchange: word | meaning in Korean | pronunciation guide)`
  };
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [sysMsg, ...messages],
      temperature: 0.8,
      max_tokens: 600
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error: ${res.status}`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

function parseAIResponse(text) {
  const lines = text.split('\n');
  let conversation = '', feedback = '', suggestions = '', vocabulary = '';
  let current = 'conversation';
  for (const line of lines) {
    if (line.startsWith('📝')) { current = 'feedback'; feedback += line.replace('📝', '').trim() + '\n'; }
    else if (line.startsWith('💡')) { current = 'suggestions'; suggestions += line.replace('💡', '').trim() + '\n'; }
    else if (line.startsWith('📖')) { current = 'vocabulary'; vocabulary += line.replace('📖', '').trim() + '\n'; }
    else if (current === 'feedback') feedback += line + '\n';
    else if (current === 'suggestions') suggestions += line + '\n';
    else if (current === 'vocabulary') vocabulary += line + '\n';
    else conversation += line + '\n';
  }
  return {
    conversation: conversation.trim(),
    feedback: feedback.trim(),
    suggestions: suggestions.trim(),
    vocabulary: vocabulary.trim()
  };
}

// ═══════════════════════════════════════════════════════
// 🗣️ SPEECH UTILITIES (Google TTS - 브라우저 내장 고품질 음성)
// ═══════════════════════════════════════════════════════
let cachedVoices = {};

function getBestVoice(lang) {
  const langCode = lang === "en" ? "en" : "ja";
  if (cachedVoices[langCode]) return cachedVoices[langCode];
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;

  // 우선순위: Google > Microsoft > Apple > 기타
  const langVoices = voices.filter(v => v.lang.startsWith(langCode));
  const google = langVoices.find(v => v.name.includes('Google'));
  const microsoft = langVoices.find(v => v.name.includes('Microsoft'));
  const premium = langVoices.find(v => v.name.includes('Premium') || v.name.includes('Enhanced') || v.name.includes('Natural'));
  const best = google || premium || microsoft || langVoices[0] || null;
  if (best) cachedVoices[langCode] = best;
  return best;
}

// 음성 목록 미리 로드
window.speechSynthesis.onvoiceschanged = () => { cachedVoices = {}; };
window.speechSynthesis.getVoices();

function speak(text, lang) {
  stopSpeaking();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === "en" ? "en-US" : "ja-JP";
  u.rate = 0.9;
  u.pitch = 1.0;
  const voice = getBestVoice(lang);
  if (voice) u.voice = voice;
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
}

function useSpeechRecognition(lang, apiKey) {
  const [transcript, setTranscript] = useState('');
  const [interimText, setInterimText] = useState('');
  const [listening, setListening] = useState(false);
  const [processing, setProcessing] = useState(false);
  const mediaRecRef = useRef(null);
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const timerRef = useRef(null);
  const secondsRef = useRef(0);

  const startListening = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;

      // MediaRecorder 설정 - iOS Safari 호환
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
      const recorder = new MediaRecorder(stream, { mimeType });
      chunksRef.current = [];

      recorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunksRef.current.push(e.data);
      };

      recorder.onstop = async () => {
        // 마이크 스트림 종료
        stream.getTracks().forEach(t => t.stop());
        clearInterval(timerRef.current);
        secondsRef.current = 0;

        if (chunksRef.current.length === 0) {
          setListening(false);
          return;
        }

        // Whisper API로 전송
        setProcessing(true);
        setInterimText(lang === 'en' ? 'Recognizing...' : '認識中...');
        try {
          const blob = new Blob(chunksRef.current, { type: mimeType });
          const ext = mimeType.includes('webm') ? 'webm' : 'mp4';
          const formData = new FormData();
          formData.append('file', blob, `audio.${ext}`);
          formData.append('model', 'whisper-1');
          formData.append('language', lang === 'en' ? 'en' : 'ja');

          const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}` },
            body: formData
          });

          if (res.ok) {
            const data = await res.json();
            const text = data.text?.trim();
            if (text) {
              setTranscript(text);
              setInterimText('');
            } else {
              setInterimText('');
            }
          } else {
            const err = await res.json().catch(() => ({}));
            console.log('Whisper error:', err);
            setInterimText('⚠️ 인식 실패');
            setTimeout(() => setInterimText(''), 2000);
          }
        } catch (e) {
          console.log('Whisper error:', e);
          setInterimText('⚠️ 인식 실패');
          setTimeout(() => setInterimText(''), 2000);
        }
        setProcessing(false);
        setListening(false);
      };

      mediaRecRef.current = recorder;
      recorder.start(1000); // 1초마다 chunk 수집
      setListening(true);
      setTranscript('');
      secondsRef.current = 0;
      setInterimText(lang === 'en' ? '🎤 Recording...' : '🎤 録音中...');

      // 녹음 시간 표시
      timerRef.current = setInterval(() => {
        secondsRef.current++;
        const s = secondsRef.current;
        setInterimText(`🎤 ${s}s ${lang === 'en' ? 'Recording...' : '録音中...'}`);
      }, 1000);

    } catch (e) {
      alert(lang === 'en' ? 'Microphone access denied. Please allow microphone permission.' : 'マイクへのアクセスが拒否されました。マイクの許可を許可してください。');
      console.log('Mic error:', e);
    }
  }, [lang, apiKey]);

  const stopListening = useCallback(() => {
    if (mediaRecRef.current && mediaRecRef.current.state === 'recording') {
      mediaRecRef.current.stop();
    }
  }, []);

  return { transcript, setTranscript, interimText, listening, processing, startListening, stopListening };
}

// 🏗️ MAIN APP COMPONENT
// ═══════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('home');
  const [lang, setLang] = useState('en');
  const [selectedLoc, setSelectedLoc] = useState(null);
  const [selectedScen, setSelectedScen] = useState(null);
  const [apiKey, setApiKey] = useState(() => {
    try { return localStorage.getItem('convomaster_apikey') || ''; } catch(e) { return ''; }
  });
  const [showSettings, setShowSettings] = useState(false);
  const [tempKey, setTempKey] = useState('');

  // Conversation state
  const [messages, setMessages] = useState([]);
  const [aiLoading, setAiLoading] = useState(false);
  const [conversationHistory, setConversationHistory] = useState([]);
  const [allFeedback, setAllFeedback] = useState([]);
  const [allVocabulary, setAllVocabulary] = useState([]);
  const chatEndRef = useRef(null);

  // Speech
  const { transcript, setTranscript, interimText, listening, processing, startListening, stopListening } = useSpeechRecognition(lang, apiKey);
  const [textInput, setTextInput] = useState('');

  // Auto-scroll
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages, aiLoading]);

  // Transcript → 자동 전송
  const sendRef = useRef(null);
  sendRef.current = () => {
    const text = textInput.trim();
    if (!text || aiLoading) return;
    if (!apiKey) { setShowSettings(true); return; }
    setTextInput('');
    setTranscript('');
    const userMsg = { role:'user', content: text, parsed: null };
    setMessages(prev => [...prev, userMsg]);
    const newHistory = [...conversationHistory, { role:'user', content: text }];
    setConversationHistory(newHistory);
    setAiLoading(true);
    callOpenAI(newHistory, apiKey, lang, selectedScen.c).then(aiText => {
      const parsed = parseAIResponse(aiText);
      const aiMsg = { role:'assistant', content: parsed.conversation, parsed };
      setMessages(prev => [...prev, aiMsg]);
      setConversationHistory(prev => [...prev, { role:'assistant', content: parsed.conversation }]);
      if (parsed.feedback) setAllFeedback(prev => [...prev, { userText: text, feedback: parsed.feedback, suggestions: parsed.suggestions }]);
      if (parsed.vocabulary) setAllVocabulary(prev => [...prev, parsed.vocabulary]);
      speak(parsed.conversation, lang);
    }).catch(err => {
      const errMsg = { role:'assistant', content: `⚠️ Error: ${err.message}`, parsed: { conversation:`⚠️ ${err.message}`, feedback:'', suggestions:'', vocabulary:'' } };
      setMessages(prev => [...prev, errMsg]);
    }).finally(() => setAiLoading(false));
  };

  useEffect(() => {
    if (transcript) {
      setTextInput(transcript);
      // ⏹ 누른 후 transcript가 확정되면 자동 전송
      setTimeout(() => { sendRef.current && sendRef.current(); }, 100);
    }
  }, [transcript]);

  // Start conversation
  function startConversation(scenario) {
    setSelectedScen(scenario);
    const firstMsg = { role:'assistant', content: scenario.s[lang], parsed: { conversation: scenario.s[lang], feedback:'', suggestions:'', vocabulary:'' } };
    setMessages([firstMsg]);
    setConversationHistory([{ role:'assistant', content: scenario.s[lang] }]);
    setAllFeedback([]);
    setAllVocabulary([]);
    setScreen('conversation');
    // 첫 인사말 자동 재생
    setTimeout(() => speak(scenario.s[lang], lang), 300);
  }

  // Send message
  async function sendMessage() {
    const text = textInput.trim();
    if (!text || aiLoading) return;
    if (!apiKey) { setShowSettings(true); return; }
    setTextInput('');
    setTranscript('');

    const userMsg = { role:'user', content: text, parsed: null };
    setMessages(prev => [...prev, userMsg]);

    const newHistory = [...conversationHistory, { role:'user', content: text }];
    setConversationHistory(newHistory);
    setAiLoading(true);

    try {
      const aiText = await callOpenAI(newHistory, apiKey, lang, selectedScen.c);
      const parsed = parseAIResponse(aiText);
      const aiMsg = { role:'assistant', content: parsed.conversation, parsed };
      setMessages(prev => [...prev, aiMsg]);
      setConversationHistory(prev => [...prev, { role:'assistant', content: parsed.conversation }]);
      if (parsed.feedback) setAllFeedback(prev => [...prev, { userText: text, feedback: parsed.feedback, suggestions: parsed.suggestions }]);
      if (parsed.vocabulary) setAllVocabulary(prev => [...prev, parsed.vocabulary]);
      speak(parsed.conversation, lang);
    } catch (err) {
      const errMsg = { role:'assistant', content: `⚠️ Error: ${err.message}`, parsed: { conversation:`⚠️ ${err.message}`, feedback:'', suggestions:'', vocabulary:'' } };
      setMessages(prev => [...prev, errMsg]);
    }
    setAiLoading(false);
  }

  // Navigate
  function goHome() { setScreen('home'); stopSpeaking(); }
  function goLocations() { setScreen('locations'); }
  function goScenarios(loc) { setSelectedLoc(loc); setScreen('scenarios'); }
  function goReview() { setScreen('review'); stopSpeaking(); }

  // Settings Modal
  function saveApiKey() {
    const key = tempKey.trim();
    setApiKey(key);
    try { localStorage.setItem('convomaster_apikey', key); } catch(e) {}
    setShowSettings(false);
  }

  // ── RENDER ──
  return (
    <div style={S.app}>
      {/* HEADER */}
      {screen !== 'home' && (
        <div style={S.header}>
          <button style={S.backBtn} onClick={() => {
            if (screen === 'conversation') goReview();
            else if (screen === 'review') goHome();
            else if (screen === 'scenarios') goLocations();
            else goHome();
          }}>
            {screen === 'conversation' ? '⏹' : '←'}
          </button>
          <span style={S.headerTitle}>
            {screen === 'locations' && (lang==='en'?'Choose Location':'場所を選択')}
            {screen === 'scenarios' && selectedLoc && `${selectedLoc.icon} ${selectedLoc.name[lang]}`}
            {screen === 'conversation' && selectedScen && selectedScen.t[lang]}
            {screen === 'review' && (lang==='en'?'Review':'復習')}
          </span>
          <button style={S.settingsBtn} onClick={() => { setTempKey(apiKey); setShowSettings(true); }}>⚙️</button>
        </div>
      )}

      {/* HOME SCREEN */}
      {screen === 'home' && (
        <div style={S.homeWrap}>
          <div style={S.logo}>
            <div style={S.logoIcon}>🗣️</div>
            <div style={S.logoTitle}>ConvoMaster</div>
            <div style={S.logoSub}>AI 실전 회화 연습 · 무제한 대화</div>
          </div>
          <div style={S.langToggle}>
            <button style={S.langBtn(lang==='en')} onClick={()=>setLang('en')}>🇺🇸 English</button>
            <button style={S.langBtn(lang==='ja')} onClick={()=>setLang('ja')}>🇯🇵 日本語</button>
          </div>
          <div style={S.statCards}>
            <div style={S.statCard}><div style={S.statNum}>30</div><div style={S.statLabel}>{lang==='en'?'Locations':'場所'}</div></div>
            <div style={S.statCard}><div style={S.statNum}>100</div><div style={S.statLabel}>{lang==='en'?'Scenarios':'シナリオ'}</div></div>
          </div>
          <div style={S.apiStatus(!!apiKey)}>
            {apiKey ? '✅ API Key 설정 완료' : '⚠️ API Key를 설정해주세요'}
          </div>
          <button style={S.startBtn} onClick={goLocations}>
            {lang==='en'?'Start Practice':'練習を始める'} →
          </button>
          <button style={{...S.startBtn, background:'#334155', marginTop:'0'}} onClick={() => { setTempKey(apiKey); setShowSettings(true); }}>
            ⚙️ API Key 설정
          </button>
        </div>
      )}

      {/* LOCATIONS */}
      {screen === 'locations' && (
        <div style={S.locGrid}>
          {LOCATIONS.map(loc => {
            const count = SCENARIOS.filter(s=>s.lid===loc.id).length;
            return (
              <button key={loc.id} style={S.locCard} onClick={()=>goScenarios(loc)}>
                <div style={S.locIcon}>{loc.icon}</div>
                <div style={S.locName}>{loc.name[lang]}</div>
                <div style={S.locCount}>{count} {lang==='en'?'scenarios':'シナリオ'}</div>
              </button>
            );
          })}
        </div>
      )}

      {/* SCENARIOS */}
      {screen === 'scenarios' && selectedLoc && (
        <div style={S.scenList}>
          {SCENARIOS.filter(s=>s.lid===selectedLoc.id).map(sc => (
            <button key={sc.id} style={S.scenCard} onClick={()=>startConversation(sc)}>
              <span style={S.scenTitle}>{sc.t[lang]}</span>
              <span style={S.scenArrow}>→</span>
            </button>
          ))}
        </div>
      )}

      {/* CONVERSATION */}
      {screen === 'conversation' && (
        <div style={S.chatWrap}>
          <div style={S.chatMessages}>
            {messages.map((msg, i) => (
              <div key={i} style={S.msgBubble(msg.role==='user')}>
                <div style={S.msgLabel(msg.role==='user')}>
                  {msg.role==='user' ? '🧑 You' : '🤖 Partner'}
                </div>
                <div style={S.msgText(msg.role==='user')}>
                  {msg.parsed ? msg.parsed.conversation : msg.content}
                  {msg.role==='assistant' && (
                    <button style={S.speakBtn} onClick={()=>speak(msg.parsed?.conversation||msg.content, lang)}>🔊</button>
                  )}
                </div>
                {msg.parsed?.feedback && (
                  <div style={S.feedbackBox}>
                    <div style={S.fbSection}><div style={S.fbTitle}>📝 피드백</div>{msg.parsed.feedback}</div>
                    {msg.parsed.suggestions && <div style={S.fbSection}><div style={S.fbTitle}>💡 추천표현</div>{msg.parsed.suggestions}</div>}
                    {msg.parsed.vocabulary && <div style={S.fbSection}><div style={S.fbTitle}>📖 어휘</div>{msg.parsed.vocabulary}</div>}
                  </div>
                )}
              </div>
            ))}
            {aiLoading && (
              <div style={S.msgBubble(false)}>
                <div style={S.msgLabel(false)}>🤖 Partner</div>
                <div style={S.typingDots}>
                  <span style={S.dot(0)}></span>
                  <span style={S.dot(1)}></span>
                  <span style={S.dot(2)}></span>
                </div>
              </div>
            )}
            <div ref={chatEndRef}></div>
          </div>
          <div style={S.inputWrap}>
            <button style={S.iconBtn(listening||processing, listening?'#ef4444':'#f59e0b')} onClick={listening?stopListening:startListening} disabled={processing||!apiKey}>
              {processing?'⏳':listening?'⏹':'🎤'}
            </button>
            <input
              style={{...S.textInput, ...((listening||processing)?{borderColor: listening?'#ef4444':'#f59e0b'}:{})}}
              value={(listening||processing) ? (interimText || textInput) : textInput}
              onChange={e=>setTextInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&sendMessage()}
              placeholder={listening ? (lang==='en'?'🎤 Recording... tap ⏹ to stop':'🎤 録音中... ⏹を押して停止') : processing ? (lang==='en'?'Recognizing...':'認識中...') : (lang==='en'?'Type or speak...':'入力または音声...')}
              readOnly={listening||processing}
            />
            <button style={S.iconBtn(false,'#3b82f6')} onClick={sendMessage}>➤</button>
            <button style={S.endBtn} onClick={goReview}>
              {lang==='en'?'End':'終了'}
            </button>
          </div>
        </div>
      )}

      {/* REVIEW */}
      {screen === 'review' && <ReviewScreen messages={messages} allFeedback={allFeedback} allVocabulary={allVocabulary} lang={lang} scenario={selectedScen} />}

      {/* SETTINGS MODAL */}
      {showSettings && (
        <div style={S.overlay} onClick={()=>setShowSettings(false)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.modalTitle}>⚙️ OpenAI API Key 설정</div>
            <input
              style={S.modalInput}
              type="password"
              value={tempKey}
              onChange={e=>setTempKey(e.target.value)}
              placeholder="sk-..."
            />
            <div style={S.modalHint}>
              💡 API Key는 브라우저에만 저장되며 서버로 전송되지 않습니다.<br/>
              🔊 원어민급 TTS 음성이 자동으로 활성화됩니다.<br/>
              OpenAI에서 API Key를 발급받으세요: platform.openai.com
            </div>
            <div style={S.modalBtnRow}>
              <button style={S.modalBtn(false)} onClick={()=>setShowSettings(false)}>취소</button>
              <button style={S.modalBtn(true)} onClick={saveApiKey}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// 📋 REVIEW SCREEN COMPONENT
// ═══════════════════════════════════════════════════════
function ReviewScreen({ messages, allFeedback, allVocabulary, lang, scenario }) {
  const [tab, setTab] = useState('script');
  const tabs = [
    { id:'script', label: lang==='en'?'Script':'スクリプト' },
    { id:'feedback', label: lang==='en'?'Feedback':'フィードバック' },
    { id:'vocabulary', label: lang==='en'?'Vocabulary':'語彙' },
    { id:'expressions', label: lang==='en'?'Expressions':'表現' },
  ];

  return (
    <div style={S.reviewWrap}>
      {/* Scenario title */}
      {scenario && (
        <div style={{textAlign:'center', marginBottom:'16px'}}>
          <div style={{fontSize:'13px', color:'#64748b'}}>{LOCATIONS.find(l=>l.id===scenario.lid)?.icon} {LOCATIONS.find(l=>l.id===scenario.lid)?.name[lang]}</div>
          <div style={{fontSize:'18px', fontWeight:'700', color:'#f1f5f9', marginTop:'4px'}}>{scenario.t[lang]}</div>
        </div>
      )}
      {/* Tabs */}
      <div style={S.tabBar}>
        {tabs.map(t => (
          <button key={t.id} style={S.tab(tab===t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>
      {/* Script tab */}
      {tab === 'script' && (
        <div>
          {messages.length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'32px'}}>대화 기록이 없습니다</div>}
          {messages.map((msg, i) => (
            <div key={i} style={S.reviewCard}>
              <div style={{fontSize:'10px',color:'#64748b',marginBottom:'4px'}}>{msg.role==='user'?'🧑 You':'🤖 Partner'}</div>
              <div style={S.reviewMsg(msg.role==='user')}>
                {msg.parsed ? msg.parsed.conversation : msg.content}
                <button style={S.speakBtn} onClick={()=>speak(msg.parsed?.conversation||msg.content, lang)}>🔊</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {/* Feedback tab */}
      {tab === 'feedback' && (
        <div>
          {allFeedback.length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'32px'}}>피드백 내역이 없습니다</div>}
          {allFeedback.map((fb, i) => (
            <div key={i} style={S.reviewCard}>
              <div style={{fontSize:'12px',color:'#60a5fa',fontWeight:'600',marginBottom:'6px'}}>"{fb.userText}"</div>
              <div style={{fontSize:'12px',color:'#94a3b8',lineHeight:'1.6'}}>{fb.feedback}</div>
            </div>
          ))}
        </div>
      )}
      {/* Vocabulary tab */}
      {tab === 'vocabulary' && (
        <div>
          {allVocabulary.length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'32px'}}>어휘 내역이 없습니다</div>}
          {allVocabulary.map((v, i) => (
            <div key={i} style={S.reviewCard}>
              <div style={{fontSize:'12px',color:'#e2e8f0',lineHeight:'1.6',whiteSpace:'pre-wrap'}}>{v}</div>
            </div>
          ))}
        </div>
      )}
      {/* Expressions tab */}
      {tab === 'expressions' && (
        <div>
          {allFeedback.filter(f=>f.suggestions).length === 0 && <div style={{textAlign:'center',color:'#64748b',padding:'32px'}}>추천 표현이 없습니다</div>}
          {allFeedback.filter(f=>f.suggestions).map((fb, i) => (
            <div key={i} style={S.reviewCard}>
              <div style={{fontSize:'11px',color:'#64748b',marginBottom:'4px'}}>"{fb.userText}" 대신:</div>
              <div style={{fontSize:'12px',color:'#e2e8f0',lineHeight:'1.8',whiteSpace:'pre-wrap'}}>{fb.suggestions}</div>
            </div>
          ))}
        </div>
      )}
      {/* Back to home */}
      <button style={{...S.startBtn, marginTop:'16px'}} onClick={()=>window.location.reload()}>
        🏠 {lang==='en'?'Back to Home':'ホームに戻る'}
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// 🚀 MOUNT
// ═══════════════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
